# Aedos pattern catalog — v0.14 (9 patterns).
#
# A small fixed set of structural patterns. Predicate labels are free-form
# WITHIN a pattern. The pattern classifies a claim's STRUCTURE and
# informs extraction; verification routing is decided per-claim by the
# LLM router (added in Phase 2 — patterns no longer carry a
# verification_method).
#
# Phase 1 adds the 9th pattern, mereological, distinct from spatial_temporal
# because constitutive parthood does not in general distribute the same
# way locational containment does, and conflating the two produces
# systematic errors in Layer 4 derivation. See aedos_architecture.md
# under "The nine patterns" for the rationale.
#
# Field shape:
#   description: what kinds of claims fit; shown to the extractor LLM
#   slots: each {name, type, required}; the structural payload
#   example_predicates: a non-exhaustive list shown to the extractor as
#     "things people typically say in this pattern"
#   example_extractions: 3-5 worked examples
#   disambiguation_notes: how to tell this pattern apart from neighbors
#   query_strategy: ordered list of query templates used by the retrieval
#     verifier WHEN the LLM router chooses retrieval for a claim. The
#     verifier tries them in order and uses the first attempt that
#     returns >= 2 results. Never prepend "current".

# =====================================================================
role_assignment:
  description: |
    A person (or organization) holds a named role, position, office, or
    title, optionally within a specific organization, optionally bounded
    by time. Includes political, corporate, academic, and ceremonial
    roles. Roles are conferred and time-bounded; that's the test for
    this pattern vs `categorical`.
  slots:
    - { name: agent, type: entity, required: true }
    - { name: role, type: string, required: true }
    - { name: org, type: entity_or_string, required: false }
    - { name: valid_from, type: date, required: false }
    - { name: valid_until, type: date, required: false }
  example_predicates:
    - holds_role
    - currently_holds
    - served_as
    - was_president_of
    - is_ceo_of
    - was_inaugurated_as
  query_strategy:
    - "{agent} {role}"
    - "{agent} {org} {role}"
    - "{agent}"
  example_extractions:
    - input: "Donald Trump is the 47th President"
      output:
        pattern: role_assignment
        predicate: holds_role
        slots: { agent: "Donald Trump", role: "47th President", org: "United States" }
        polarity: 1
    - input: "Trump served as the 45th president from 2017 to 2021"
      output:
        pattern: role_assignment
        predicate: served_as
        slots:
          agent: "Donald Trump"
          role: "45th President"
          org: "United States"
          valid_from: "2017-01-20"
          valid_until: "2021-01-20"
        polarity: 1
    - input: "Tim Cook is CEO of Apple"
      output:
        pattern: role_assignment
        predicate: is_ceo_of
        slots: { agent: "Tim Cook", role: "CEO", org: "Apple" }
        polarity: 1
  disambiguation_notes: |
    role_assignment vs categorical: role_assignment is held during a time
    period and is conferrable (someone became, someone else will become).
    categorical is intrinsic (Marie Curie WAS a physicist — that's a
    category, not a tenure).
    role_assignment vs relational: relational is a relation between two
    entities (defeated_in_election, married_to). role_assignment binds an
    entity to a role/office.
  default_routing_method: retrieval
  boundary_examples:
    - input: "Marie Curie was a physicist"
      this_pattern: false
      correct_pattern: categorical
      reason: |
        "physicist" is a profession (an intrinsic kind), not an office
        someone holds. Conferred-and-relinquishable roles (President,
        CEO) are role_assignment; intrinsic professions (physicist,
        baker, novelist) are categorical.
    - input: "Trump defeated Harris in the 2024 election"
      this_pattern: false
      correct_pattern: relational
      reason: |
        Election outcomes are relations between two entities, not role
        bindings. The role-assignment claim from the same election is
        "Trump is the 47th President" — that's a separate fact.

# =====================================================================
preference:
  description: |
    An agent has a stated affinity, preference, or aversion toward an
    object. Includes likes/dislikes/loves/hates/prefers and intensified
    forms. Subjective by definition; cannot be verified externally.
  slots:
    - { name: agent, type: entity, required: true }
    - { name: attitude, type: string, required: false }   # the verb's flavor
    - { name: object, type: entity_or_string, required: true }
    - { name: intensity, type: string, required: false }   # mild / strong / etc.
  example_predicates:
    - likes
    - dislikes
    - loves
    - hates
    - prefers
    - adores
    - tolerates
    - is_obsessed_with
  example_extractions:
    - input: "I like peanut butter"
      output:
        pattern: preference
        predicate: likes
        slots: { agent: user, object: "peanut butter" }
        polarity: 1
    - input: "I'm obsessed with sourdough"
      output:
        pattern: preference
        predicate: is_obsessed_with
        slots: { agent: user, object: "sourdough", intensity: strong }
        polarity: 1
    - input: "I don't like olives"
      output:
        pattern: preference
        predicate: likes
        slots: { agent: user, object: "olives" }
        polarity: 0
  disambiguation_notes: |
    preference vs propositional_attitude: preference takes an OBJECT (a
    thing or person liked/disliked); propositional_attitude takes a
    PROPOSITION (a sentence-like thing — "I believe Fed will cut rates").
    "I think peanut butter is the best" is a preference, not a belief.
    preference is RESERVED FOR HUMAN/USER-STATED AFFINITIES. Animal
    behavior, organizational tendencies, and any "X does Y to/with Z"
    pattern about a non-human subject is RELATIONAL, not preference.
  agent_constraint: must_be_user
  subject_slot_for_constraint: agent
  default_routing_method: user_authoritative
  boundary_examples:
    - input: "baboons forage for natural foods"
      this_pattern: false
      correct_pattern: relational
      reason: |
        Animal behavior — what a species does — is a relation between
        entities, not a preference. preference is reserved for human-
        stated affinities; using it for non-human agents violates the
        pattern's USER_SUBJECT invariant and the validator will reject.
    - input: "Anthropic prefers safety research"
      this_pattern: false
      correct_pattern: relational
      reason: |
        Organizational tendencies are relations, not preferences.
        "Anthropic does X with Y" is relational regardless of how
        affinity-shaped the verb sounds.
    - input: "I dislike olives"
      this_pattern: true
      reason: |
        First-person human affinity; agent="user" — the canonical
        preference shape.

# =====================================================================
quantitative:
  description: |
    A subject has a numeric (or string-valued) measurable property.
    Counts, lengths, weights, prices, years. Verification routes to a
    python function when the property is computable from the subject
    (e.g. counting letters, string length); to retrieval when it's a
    fact about the world (e.g. weight of an animal, founding year).
  slots:
    - { name: subject, type: entity, required: true }
    - { name: property, type: string, required: true }
    - { name: value, type: any, required: true }   # numeric usually, occasionally string
    - { name: unit, type: string, required: false }
  example_predicates:
    - has_count
    - has_length
    - weighs
    - costs
    - born_in_year
    - founded_in_year
    - sum_equals
    - product_equals
    - prime_count
  query_strategy:
    - "{subject} {property}"
    - "{subject} {property} {value}"
    - "{subject}"
  example_extractions:
    - input: "Strawberry has 2 p's"
      output:
        pattern: quantitative
        predicate: has_count
        slots: { subject: "strawberry", property: "letter_p", value: 2 }
        polarity: 1
    - input: "Einstein was born in 1879"
      output:
        pattern: quantitative
        predicate: born_in_year
        slots: { subject: "Einstein", property: "birth_year", value: 1879 }
        polarity: 1
    - input: "A blue whale weighs about 150 tons"
      output:
        pattern: quantitative
        predicate: weighs
        slots: { subject: "blue whale", property: "weight", value: 150, unit: tons }
        polarity: 1
  disambiguation_notes: |
    quantitative vs role_assignment: founding YEAR is quantitative
    (founded_in_year, value=int); founding the org as an event is
    `event` pattern. "Anthropic was founded in 2021" is quantitative.
    "Anthropic was founded by Dario Amodei" is relational (subject:
    Anthropic, relation: founded_by, object: Dario Amodei).
  default_routing_method: python_with_canonical_constants
  triage_verify_predicates:
    # Counting / string operations the python verifier settles
    # against the source text.
    - has_count
    - letter_count
    - word_count
    - character_count
    - vowel_count
    # Time / clock operations the python verifier settles via zoneinfo.
    - current_time
    - current_date
    - current_day_of_week
    - current_year
    - time_difference_hours
    - time_difference_days
  boundary_examples:
    - input: "How many r's are in 'strawberry'?"
      this_pattern: false
      reason: |
        Question, not assertion. Counting questions yield no claim;
        only counting DECLARATIVES extract.

# =====================================================================
spatial_temporal:
  description: |
    An entity is located in or associated with a place, optionally
    bounded by time. Covers residence, employment, education, and
    presence-at — i.e. LOCATIONAL containment. The user's own location
    is user-authoritative; everyone else's goes to retrieval.
    NOT for constitutive parthood ("Williamstown is part of
    Massachusetts", "the engine is part of the car") — those are
    mereological. The test: if the speaker said "in" / "at" / "near" /
    "located in" / "lives in" / "works at", it's spatial_temporal.
    If they said "part of" / "member of" / "composed of" /
    "constitutes", it's mereological.
  slots:
    - { name: entity, type: entity, required: true }
    - { name: location, type: entity_or_string, required: true }
    - { name: relation_kind, type: string, required: false }  # lives_in / works_at / studies_at
    - { name: valid_from, type: date, required: false }
    - { name: valid_until, type: date, required: false }
  example_predicates:
    - lives_in
    - located_in
    - works_at
    - studies_at
    - visited
    - was_born_in
  query_strategy:
    - "{entity} {relation_kind} {location}"
    - "{entity} {location}"
    - "{entity}"
  example_extractions:
    - input: "I live in Williamstown"
      output:
        pattern: spatial_temporal
        predicate: lives_in
        slots: { entity: user, location: "Williamstown", relation_kind: residence }
        polarity: 1
    - input: "Tokyo is in Japan"
      output:
        pattern: spatial_temporal
        predicate: located_in
        slots: { entity: "Tokyo", location: "Japan", relation_kind: containment }
        polarity: 1
    - input: "Marie Curie worked at the Sorbonne"
      output:
        pattern: spatial_temporal
        predicate: works_at
        slots: { entity: "Marie Curie", location: "Sorbonne", relation_kind: employment }
        polarity: 1
  disambiguation_notes: |
    spatial_temporal vs categorical: "Tokyo is a city" is categorical
    (an intrinsic kind). "Tokyo is in Japan" is spatial_temporal (a
    locational containment relation). One sentence can yield BOTH
    ("Tokyo is a city in Japan" → two extractions).
    spatial_temporal vs mereological: locational vs constitutive. The
    surface form is the tiebreaker:
      - "Asa lives in Williamstown" → spatial_temporal (Asa is located
        in the town as a resident; removing Asa doesn't change what
        Williamstown is).
      - "Williamstown is part of Massachusetts" → mereological
        (Williamstown constitutes territory of the state).
      - "Tokyo is in Japan" → spatial_temporal (locational, by surface
        form).
      - "Tokyo is part of Japan" → mereological (constitutive, by
        surface form).
    Both can be true of the same pair — extract per the surface form
    the speaker used, not by inference.
  default_routing_method: retrieval
  triage_verify_predicates:
    # Locational predicates the retrieval verifier can settle against
    # Wikipedia geography / timezone / political-boundary articles.
    - located_in
    - capital_of
    - borders
    - in_continent
    - in_timezone
  boundary_examples:
    - input: "Cairo is in Egypt Standard Time (UTC+2)"
      this_pattern: true
      reason: |
        Timezone is a locational containment claim — `located_in`
        with location naming the timezone region. Retrieval verifier
        can confirm via Wikipedia's geography or timezone articles.
    - input: "Williamstown is part of Massachusetts"
      this_pattern: false
      correct_pattern: mereological
      reason: |
        "is part of" — constitutive parthood, not locational
        containment. Speaker's surface form is the tiebreaker.

# =====================================================================
categorical:
  description: |
    An entity belongs to a general category, kind, or class. Profession
    membership, taxonomic classification, type-of-thing claims. Intrinsic
    to the entity rather than conferred (vs role_assignment).
  slots:
    - { name: entity, type: entity, required: true }
    - { name: category, type: string, required: true }
  example_predicates:
    - is_a
    - is_kind_of
    - instance_of
  query_strategy:
    - "{entity} {category}"
    # v0.14.1 — topic-pivot. "baboons are mammals" needs the
    # category page (Mammal) when the species page's lead doesn't
    # state the classification explicitly.
    - "{category}"
    - "what is {entity}"
    - "{entity}"
  example_extractions:
    - input: "Marie Curie was a physicist"
      output:
        pattern: categorical
        predicate: is_a
        slots: { entity: "Marie Curie", category: "physicist" }
        polarity: 1
    - input: "The kakapo is a bird"
      output:
        pattern: categorical
        predicate: is_a
        slots: { entity: "kakapo", category: "bird" }
        polarity: 1
    - input: "Tokyo is a city"
      output:
        pattern: categorical
        predicate: is_a
        slots: { entity: "Tokyo", category: "city" }
        polarity: 1
  disambiguation_notes: |
    categorical vs role_assignment: physicist is a profession (a kind);
    47th President is a role (a tenure). If the noun could plausibly be
    held during a fixed time period and conferred to someone else, it's
    role_assignment. If it's intrinsic, it's categorical.
    categorical vs mereological: categorical is membership in a KIND
    ("Tokyo is a city" — Tokyo is an instance of the city kind).
    mereological is parthood in a SPECIFIC larger thing ("Tokyo is
    part of Japan" — Tokyo is a constituent of Japan). One sentence
    often yields both: "Tokyo is a city in Japan" → categorical
    (Tokyo is_a city) + spatial_temporal (Tokyo located_in Japan).
    "Massachusetts is one of the New England states" → mereological
    (Massachusetts member_of New England), NOT categorical, because
    "the New England states" names a specific group of six states,
    not a kind.
  default_routing_method: retrieval
  boundary_examples:
    - input: "Donald Trump is the 47th President"
      this_pattern: false
      correct_pattern: role_assignment
      reason: |
        "47th President" is a held office, not an intrinsic kind.
        Conferred-and-relinquishable.
    - input: "Tokyo is a city"
      this_pattern: true
      reason: |
        "city" is a kind / type. Intrinsic to Tokyo, not conferred.

# =====================================================================
relational:
  description: |
    A directed relation between two entities, optionally time-bounded.
    Election outcomes, marriages, founder-of-org, predecessor/successor,
    alliances. Distinct from role_assignment (binds entity to a role)
    and event (a discrete occurrence).
  slots:
    - { name: subject, type: entity, required: true }
    - { name: relation, type: string, required: false }   # may mirror predicate
    - { name: object, type: entity, required: true }
    - { name: valid_from, type: date, required: false }
    - { name: valid_until, type: date, required: false }
  example_predicates:
    - succeeded_by
    - preceded_by
    - married_to
    - defeated_in_election
    - defeated_by
    - founded_by
    - allied_with
    - capital_of
    - authored_by
    - contains_substring
    - is_anagram_of
    - reverse_of
  query_strategy:
    - "{subject} {relation} {object}"
    - "{subject} {object}"
    # v0.14.1 — topic-pivot. Relations like "baboons hunt cooperatively"
    # often live on a topic page (Cooperative hunting) rather than the
    # species page. Searching "{relation} {object}" surfaces those.
    - "{relation} {object}"
    - "{subject}"
  example_extractions:
    - input: "Trump defeated Kamala Harris in the 2024 election"
      output:
        pattern: relational
        predicate: defeated_in_election
        slots:
          subject: "Donald Trump"
          relation: defeated_in_election
          object: "Kamala Harris"
          valid_from: "2024"
        polarity: 1
    - input: "Paris is the capital of France"
      output:
        pattern: relational
        predicate: capital_of
        slots: { subject: "Paris", relation: capital_of, object: "France" }
        polarity: 1
    - input: "Anthropic was founded by Dario Amodei"
      output:
        pattern: relational
        predicate: founded_by
        slots: { subject: "Anthropic", relation: founded_by, object: "Dario Amodei" }
        polarity: 1
  disambiguation_notes: |
    relational vs role_assignment: succession is relational ("Biden was
    succeeded by Trump" is the relation); but "Trump was inaugurated as
    47th President" is role_assignment (binds person to office).
    Election outcomes are NOT succession — Trump defeated Harris in the
    2024 election is `defeated_in_election`, not `succeeded_by`.
    relational vs preference: animal behavior (forages_for, hunts,
    migrates_to) and organizational tendencies (favors, focuses_on)
    are relational, NOT preference. preference is reserved for
    human/user-stated affinities (agent="user").
  default_routing_method: retrieval
  triage_verify_predicates:
    # String operations the python verifier handles deterministically.
    - contains_substring
    - is_anagram_of
    - reverse_of
    - starts_with
    - ends_with
    # Lookup-friendly relations the retrieval verifier settles cleanly.
    - capital_of
    - founded_by
    - married_to
    - defeated_in_election
    - authored_by
  boundary_examples:
    - input: "baboons forage for natural foods like grasses and roots"
      this_pattern: true
      reason: |
        Animal behavior (a relation between baboon and food-types) —
        belongs here, NOT in preference. preference is for human-
        stated affinities only.
    - input: "I love peanut butter"
      this_pattern: false
      correct_pattern: preference
      reason: |
        First-person human affinity. Preference, not relational.

# =====================================================================
event:
  description: |
    A discrete occurrence with one or more participants, optionally
    located and timed. Inaugurations, founding events, attendances,
    elections-as-events. Often goes to retrieval and often returns
    insufficient evidence — that's expected.
  slots:
    - { name: event_type, type: string, required: true }
    - { name: participants, type: list, required: true }
    - { name: location, type: entity_or_string, required: false }
    - { name: occurred_at, type: date, required: false }
  example_predicates:
    - won_election
    - was_inaugurated
    - founded
    - attended
    - launched
  query_strategy:
    - "{event_type} {participants_joined}"
    - "{event_type} {occurred_at}"
    - "{event_type}"
  example_extractions:
    - input: "Trump was inaugurated on January 20, 2025"
      output:
        pattern: event
        predicate: was_inaugurated
        slots:
          event_type: inauguration
          participants: ["Donald Trump"]
          occurred_at: "2025-01-20"
        polarity: 1
    - input: "Anthropic was founded in 2021 by Dario and Daniela Amodei"
      output:
        pattern: event
        predicate: founded
        slots:
          event_type: company_founding
          participants: ["Dario Amodei", "Daniela Amodei", "Anthropic"]
          occurred_at: "2021"
        polarity: 1
  disambiguation_notes: |
    event vs role_assignment: inauguration is an event (a moment in
    time); the resulting tenure is role_assignment.
    event vs relational: "Anthropic was founded by Dario" can be either:
    relational (subject: Anthropic, relation: founded_by, object: Dario)
    OR event (event_type: company_founding, participants: [Dario,
    Anthropic], occurred_at: 2021). Both are valid; extract relational
    when the time isn't named, event when it is.
  default_routing_method: retrieval
  boundary_examples:
    - input: "Trump was inaugurated as the 47th president"
      this_pattern: true
      reason: |
        Inauguration is a discrete event with a named participant.
        The role_assignment claim ("Trump holds the role 47th
        President") is a separate fact; both can be extracted.

# =====================================================================
propositional_attitude:
  description: |
    An agent has a mental attitude (belief, knowledge, hope, doubt,
    plan, feeling, intention) toward a proposition — a sentence-like
    thing rather than an object. The user's own attitudes are
    user-authoritative; anyone else's are unverifiable (we can't
    inspect their head).
  slots:
    - { name: agent, type: entity, required: true }
    - { name: attitude, type: string, required: true }   # believes / hopes / plans
    - { name: proposition, type: string, required: true }
  example_predicates:
    - believes
    - knows
    - thinks
    - doubts
    - hopes
    - plans
    - feels
    - intends
  example_extractions:
    - input: "I think the Fed will cut rates"
      output:
        pattern: propositional_attitude
        predicate: believes
        slots: { agent: user, attitude: thinks, proposition: "Fed will cut rates" }
        polarity: 1
    - input: "I feel tired"
      output:
        pattern: propositional_attitude
        predicate: feels
        slots: { agent: user, attitude: feels, proposition: "tired" }
        polarity: 1
    - input: "I plan to move next month"
      output:
        pattern: propositional_attitude
        predicate: plans
        slots: { agent: user, attitude: plans, proposition: "move next month" }
        polarity: 1
  disambiguation_notes: |
    propositional_attitude vs preference: preference takes an OBJECT
    ("I like peanut butter" → object: peanut butter). propositional_
    attitude takes a PROPOSITION ("I believe peanut butter is the best
    food" → proposition: "peanut butter is the best food"). The test
    is: can the object be replaced by a complete sentence? If yes,
    propositional_attitude.
  agent_constraint: must_be_user
  subject_slot_for_constraint: agent
  default_routing_method: user_authoritative
  boundary_examples:
    - input: "the model believes the Fed will cut rates"
      this_pattern: false
      reason: |
        Third-party mental attitudes are unverifiable (we can't
        inspect another agent's head). Either drop the claim or
        re-frame as a quote. Validator will reject this pattern with
        a non-user agent.

# =====================================================================
mereological:
  description: |
    A constitutive part-whole relation: an entity IS a constitutive
    part, member, or component of a larger entity. Constitutive
    parthood means the part contributes to the identity, structure,
    or composition of the whole — Williamstown is part of
    Massachusetts (the town constitutes part of the state's
    territory); a wheel is part of a car (the wheel constitutes part
    of the assembly); a cell is part of a body. NOT for locational
    containment ("Tokyo is in Japan", "the engine is in the car",
    "Asa lives in Williamstown") — those are spatial_temporal.
    The lexical test: "part of" / "member of" / "composed of" /
    "constitutes" / "subregion of" almost always indicate
    mereological. "in" / "at" / "near" / "located in" / "lives in"
    almost always indicate spatial_temporal. When the surface form is
    "Tokyo is in Japan" the speaker named locational containment;
    when it is "Tokyo is part of Japan" the speaker named constitutive
    parthood. Extract per the speaker's surface form, not by inference
    about which is "really" true. Both can be true of the same pair.
  slots:
    - { name: part, type: entity, required: true }
    - { name: whole, type: entity, required: true }
    - { name: valid_from, type: date, required: false }
    - { name: valid_until, type: date, required: false }
  example_predicates:
    - part_of
    - member_of
    - composed_of
    - constitutes
    - subregion_of
  query_strategy:
    - "{part} part of {whole}"
    - "{part} {whole}"
    - "{part}"
  # Phase 1 routing intent (consumed by Phase 2's llm_router.py): the
  # default verification path for mereological claims is RETRIEVAL.
  # Constitutive part-whole facts are world facts that retrieval can
  # confirm against authoritative sources (gazetteers, Wikipedia,
  # taxonomic references). User-authoritative routing applies only
  # when the part is the user themselves, which is rare for this
  # pattern. Phase 2 wires this through the LLM router; for now this
  # comment is the spec.
  example_extractions:
    - input: "Williamstown is part of Massachusetts"
      output:
        pattern: mereological
        predicate: part_of
        slots: { part: "Williamstown", whole: "Massachusetts" }
        polarity: 1
    - input: "Berkshire County is part of Massachusetts"
      output:
        pattern: mereological
        predicate: part_of
        slots: { part: "Berkshire County", whole: "Massachusetts" }
        polarity: 1
    - input: "Massachusetts is one of the New England states"
      output:
        pattern: mereological
        predicate: member_of
        slots: { part: "Massachusetts", whole: "New England" }
        polarity: 1
    - input: "Water is composed of hydrogen and oxygen"
      output:
        pattern: mereological
        predicate: composed_of
        slots: { part: "hydrogen and oxygen", whole: "water" }
        polarity: 1
    - input: "Hawaii is not part of the contiguous United States"
      output:
        pattern: mereological
        predicate: part_of
        slots: { part: "Hawaii", whole: "contiguous United States" }
        polarity: 0
  disambiguation_notes: |
    mereological vs spatial_temporal: this is the most important
    boundary. Constitutive parthood (mereological) vs locational
    containment (spatial_temporal). Side-by-side:
      - "Williamstown is part of Massachusetts" → mereological
        (the town constitutes territory of the state)
      - "Asa lives in Williamstown" → spatial_temporal
        (Asa is located in the town as a resident; removing Asa
         doesn't change what Williamstown is)
      - "Tokyo is part of Japan" → mereological (territorial)
      - "Tokyo is in Japan" → spatial_temporal (locational)
      - "the engine is in the car" → spatial_temporal (placement)
      - "the engine is part of the car" → mereological (assembly)
    The surface form is the tiebreaker. Extract per what the
    speaker said.
    mereological vs categorical: categorical is membership in a KIND
    ("Tokyo is a city" — Tokyo is an instance of the city kind).
    mereological is parthood in a SPECIFIC larger thing ("Tokyo is
    part of Japan"; "Massachusetts is a New England state" can read
    either way — when the larger thing is named as a specific group
    ("the New England states") it's mereological; when it's a kind
    ("a state") it's categorical).
    Self-parthood is invalid. The part and the whole must be distinct
    entities. Phase 2's validator enforces this; Phase 1 simply
    requires that example_extractions never violate it.
  default_routing_method: retrieval
  distinct_slots: [part, whole]
  boundary_examples:
    - input: "Tokyo is in Japan"
      this_pattern: false
      correct_pattern: spatial_temporal
      reason: |
        "in" is locational containment, not constitutive parthood.
        The speaker chose the locational surface form.
    - input: "Tokyo is part of Japan"
      this_pattern: true
      reason: |
        "is part of" — constitutive parthood. Same pair as the
        spatial_temporal example, different surface form.

# =====================================================================
# Out of scope (intentionally)
# =====================================================================
# Aesthetic judgments ("the sunset was beautiful"): no pattern fits.
#   Beauty isn't verifiable, isn't a preference of a specific agent, and
#   isn't a category we can check. Extractor must abstain.
# Counterfactuals ("if Biden had run, he would have lost"): out of scope.
#   Extractor must abstain.
# Complex causal claims ("X caused Y because of Z"): out of scope.
#   Abstain unless the claim reduces to one of the patterns above.
