<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aedos — claim-verification chat</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header>
  <h1>Aedos</h1>
  <div class="header-actions">
    <label class="model-select" title="Drives every step (chat, extraction, routing, verification, correction)">
      <select id="model-select">
        <!-- populated from /api/models on load -->
      </select>
    </label>
    <button id="inspector-btn" title="Open Fact Store / Patterns / Cache inspector">Inspector</button>
    <button id="reset-btn" title="Wipe the database">Reset DB</button>
  </div>
</header>

<main>
  <!-- Single primary view: chat (left) + live progressive flow (right).
       Click any flow step to expand its detail INLINE under it. The
       Trace tab is gone — detail lives where it's relevant. -->
  <div class="split">
    <div class="chat-pane">
      <div id="messages" class="messages"></div>
      <form id="chat-form" class="chat-form">
        <textarea id="input" placeholder="Type a message..." rows="2" required></textarea>
        <button type="submit">Send</button>
      </form>
    </div>
    <div class="flow-pane">
      <div class="flow-pane-header">
        <h2>Pipeline flow</h2>
        <span id="flow-status" class="hint">idle</span>
      </div>
      <div id="flow-container" class="flow-container">
        <p class="hint">Send a message — each pipeline stage will
          appear here as it lands. Click any step to expand its
          detail inline.</p>
      </div>
    </div>
  </div>
</main>

<!-- Slide-out inspector drawer. Holds Fact Store / Patterns / Cache
     as a sub-tabbed view. Hidden by default; toggled by the
     Inspector button. -->
<aside id="inspector" class="inspector">
  <div class="inspector-header">
    <nav class="inspector-tabs">
      <button class="inspector-tab active" data-inspector-tab="facts">Facts</button>
      <button class="inspector-tab" data-inspector-tab="patterns">Patterns</button>
      <button class="inspector-tab" data-inspector-tab="cache">Cache</button>
    </nav>
    <button id="inspector-close" title="Close inspector">✕</button>
  </div>

  <section id="inspector-facts" class="inspector-panel active">
    <div class="toolbar">
      <label>Pattern
        <select id="f-pattern">
          <option value="">(any)</option>
          <option value="role_assignment">role_assignment</option>
          <option value="preference">preference</option>
          <option value="quantitative">quantitative</option>
          <option value="spatial_temporal">spatial_temporal</option>
          <option value="categorical">categorical</option>
          <option value="relational">relational</option>
          <option value="event">event</option>
          <option value="propositional_attitude">propositional_attitude</option>
        </select>
      </label>
      <label>Predicate <input id="f-predicate" placeholder="e.g. likes"></label>
      <label>Asserted by
        <select id="f-asserted-by">
          <option value="">(any)</option>
          <option value="user">user</option>
          <option value="model">model</option>
          <option value="python_verifier">python_verifier</option>
          <option value="external">external</option>
        </select>
      </label>
      <label>Status
        <select id="f-status">
          <option value="">(any)</option>
          <option value="verified">verified</option>
          <option value="contradicted">contradicted</option>
          <option value="user_asserted">user_asserted</option>
          <option value="unverifiable_in_principle">unverifiable_in_principle</option>
          <option value="retrieval_inconclusive">retrieval_inconclusive</option>
          <option value="retrieval_failed">retrieval_failed</option>
          <option value="unverifiable_pending_implementation">unverifiable_pending_implementation</option>
          <option value="routing_anomaly">routing_anomaly</option>
        </select>
      </label>
      <label><input type="checkbox" id="f-only-valid"> only currently valid</label>
      <button id="facts-refresh">Refresh</button>
    </div>
    <div id="facts-table" class="facts-table"></div>
  </section>

  <section id="inspector-patterns" class="inspector-panel">
    <div id="predicates-table" class="predicates-table"></div>
  </section>

  <section id="inspector-cache" class="inspector-panel">
    <div class="toolbar">
      <div id="cache-stats" class="cache-stats"></div>
      <button id="cache-refresh">Refresh</button>
    </div>
    <div id="cache-table" class="facts-table"></div>
  </section>
</aside>
<div id="inspector-backdrop" class="inspector-backdrop"></div>

<script src="/static/app.js"></script>
</body>
</html>
